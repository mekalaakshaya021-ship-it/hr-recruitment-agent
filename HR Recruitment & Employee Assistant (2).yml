app:
  description: AI-powered HR assistant that supports recruitment, job description
    creation, interview preparation, onboarding, employee queries, HR documentation,
    and policy guidance. Designed to provide professional HR support and streamline
    HR processes.
  icon: 🤖
  icon_background: '#FFEAD5'
  icon_type: emoji
  mode: advanced-chat
  name: HR Recruitment & Employee Assistant
  use_icon_as_answer_icon: false
