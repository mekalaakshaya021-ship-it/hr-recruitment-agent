  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - custom
      allowed_file_upload_methods:
      - remote_url
      - local_file
      enabled: true
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 50
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: '👋 Welcome to HR Recruitment & Employee Assistant.


      I can help you with:

      • Job Description creation

      • Resume screening

      • Interview questions

      • HR emails

      • Onboarding plans

      • HR policies and employee support


      Upload a resume or ask a question to get started.

      Generate HR interview questions

      Create onboarding checklist

      Draft offer letter

      Explain leave policy

      Generate employee engagement ideas

      '
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - Create JD for HR Executive
    - Screen my uploaded resume
    - Generate recruiter interview questions
    - Create onboarding checklist
    - Explain leave policy
    suggested_questions_after_answer:
      enabled: true
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
